<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="light">
<head>
{% include meta.html %} 
</head>
<body role="document" itemscope itemtype="https://schema.org/WebPage" class="min-h-screen bg-base-100 text-base-content">
{% include header.html %} 
    <main class="flex-grow flex flex-col items-center justify-center p-8 text-center">
     {{ content }}
    </main>
 {% include footer.html %} 
     <script>
        const toggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        if (html.getAttribute('data-theme') === 'black') { toggle.checked = true; }
        toggle.addEventListener('change', () => {
            const newTheme = toggle.checked ? 'black' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
