---
layout: default
---
    <nav aria-label="Breadcrumb">
      <ol role="list" class="mx-auto mb-5 flex max-w-2xl items-center space-x-2 px-4 sm:px-6 lg:max-w-7xl lg:px-8">
        <li>
          <div class="flex items-center">
            <a href="{{ site.url }}" class="ml-0 mr-2 text-sm font-medium text-gray-900">Home</a>
            <svg viewBox="0 0 16 20" width="16" height="20" fill="currentColor" aria-hidden="true" class="h-5 w-4 text-gray-300">
              <path d="M5.697 4.34L8.98 16.532h1.327L7.025 4.341H5.697z" />
            </svg>
          </div>
        </li>
        <li class="text-sm">
          <a href="#" aria-current="page" class="font-medium text-gray-500 hover:text-gray-600">{{ page.title }}</a>
        </li>
      </ol>
    </nav>

<h3 class="text-xs font-sans font-black uppercase tracking-[0.3em] text-primary mb-10 border-b border-primary/10 pb-2">
    Posts in <b>{{ page.title }}</b>
</h3>
{% for post in site.categories[page.category] %}
        <section class="mb-24">
            <div class="space-y-6">
                <div class="group flex flex-col md:flex-row md:items-baseline gap-2 md:gap-8 py-2 border-b border-base-200/50 hover:border-primary/20 transition-all">
                    <time class="font-sans text-[10px] font-bold opacity-30 w-20 shrink-0 uppercase tracking-tighter">{{ post.date | date_to_string }}</time>
                    <span class="font-sans text-[10px] font-bold text-primary uppercase w-24 shrink-0 hidden md:block hidden">{{ post.title }}</span>
                    <a href="{{ post.url }}" class="font-serif text-xl md:text-2xl group-hover:text-primary transition-colors leading-tight">
                        {{ post.title }}
                    </a>
                </div>
            </div>
        </section>
{% endfor %}
